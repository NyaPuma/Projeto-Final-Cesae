version: "3.9"

services:

  app:
    build: .

    container_name: laravel-app

    ports:
      - "9000:9000"

    volumes:
      - .:/var/www/html

    env_file:
      - .env

    depends_on:
      - mysql

  mysql:
    image: mysql:8.4

    container_name: laravel-db

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
