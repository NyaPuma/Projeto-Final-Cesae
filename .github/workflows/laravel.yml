name: Laravel

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    steps:
    # 1. Fazer o checkout do repositório (SEMPRE primeiro)
    - uses: actions/checkout@v4

    # 2. Configurar o PHP com uma versão compatível com o Laravel 11 (8.2 ou 8.3)
    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, dom, curl, libxml, sqlite3
        coverage: none

    # 3. Copiar o ficheiro de ambiente
    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    # 4. Instalar as dependências sem restrições antigas
    - name: Install Dependencies
      run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    # 5. Gerar a Application Key
    - name: Generate key
      run: php artisan key:generate

    # 6. Ajustar as permissões das pastas do Laravel
    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache

    # 7. Criar a base de dados SQLite para os testes
    - name: Create Database
      run: |
        mkdir -p database
        touch database/database.sqlite

    # 8. Executar os testes unitários e de funcionalidade
    - name: Execute tests (Unit and Feature tests) via PHPUnit/Pest
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: php artisan test
